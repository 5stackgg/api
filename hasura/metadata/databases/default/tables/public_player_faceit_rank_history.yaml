table:
  name: player_faceit_rank_history
  schema: public
object_relationships:
  - name: match
    using:
      foreign_key_constraint_on: match_id
  - name: player
    using:
      foreign_key_constraint_on: steam_id
select_permissions:
  - role: guest
    permission:
      columns:
        - steam_id
        - skill_level
        - previous_rank
        - elo
        - match_id
        - observed_at
      filter: {}
    comment: ""
  - role: user
    permission:
      columns:
        - steam_id
        - skill_level
        - previous_rank
        - elo
        - match_id
        - observed_at
      filter: {}
    comment: ""
