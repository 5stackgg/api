table:
  name: player_aim_stats_demo
  schema: public
object_relationships:
  - name: attacker
    using:
      manual_configuration:
        column_mapping:
          attacker_steam_id: steam_id
        insertion_order: null
        remote_table:
          name: players
          schema: public
  - name: match
    using:
      foreign_key_constraint_on: match_id
  - name: match_map
    using:
      foreign_key_constraint_on: match_map_id
select_permissions:
  - role: guest
    permission:
      columns:
        - match_id
        - match_map_id
        - attacker_steam_id
        - hits
        - headshot_hits
        - non_awp_hits
        - hits_at_spotted
        - shots_at_spotted
        - counter_strafe_eligible_shots
        - counter_strafed_shots
        - spray_shots
        - spray_hits
        - crosshair_angle_sum_deg
        - crosshair_angle_count
        - time_to_damage_sum_s
        - time_to_damage_count
      filter: {}
      allow_aggregations: true
    comment: ""
