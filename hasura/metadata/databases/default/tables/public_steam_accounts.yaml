table:
  name: steam_accounts
  schema: public
object_relationships:
  - name: last_node
    using:
      foreign_key_constraint_on: last_node_id
array_relationships:
  - name: claims
    using:
      foreign_key_constraint_on:
        column: steam_account_id
        table:
          name: steam_account_claims
          schema: public
insert_permissions:
  - role: administrator
    permission:
      check: {}
      columns:
        - username
        - password
    comment: ""
select_permissions:
  - role: administrator
    permission:
      columns:
        - id
        - username
        - last_node_id
        - created_at
        - updated_at
      filter: {}
      allow_aggregations: true
    comment: ""
update_permissions:
  - role: administrator
    permission:
      columns:
        - username
        - password
      filter: {}
      check: null
    comment: ""
delete_permissions:
  - role: administrator
    permission:
      filter: {}
    comment: ""
