table:
  name: tournament_organizer_teams
  schema: public
object_relationships:
  - name: team
    using:
      foreign_key_constraint_on: team_id
  - name: tournament
    using:
      foreign_key_constraint_on: tournament_id
insert_permissions:
  - role: user
    permission:
      check:
        tournament:
          is_organizer:
            _eq: true
      columns:
        - team_id
        - tournament_id
    comment: ""
select_permissions:
  - role: guest
    permission:
      columns:
        - created_at
        - team_id
        - tournament_id
      filter: {}
    comment: ""
delete_permissions:
  - role: user
    permission:
      filter:
        tournament:
          is_organizer:
            _eq: true
    comment: ""
event_triggers:
  - name: tournament_organizer_team_events
    definition:
      enable_manual: true
      insert:
        columns: '*'
      delete:
        columns: '*'
    retry_conf:
      interval_sec: 10
      num_retries: 6
      timeout_sec: 60
    webhook: '{{HASURA_GRAPHQL_EVENT_HOOK}}'
