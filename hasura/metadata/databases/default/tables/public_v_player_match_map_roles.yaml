table:
  name: v_player_match_map_roles
  schema: public
object_relationships:
  - name: match
    using:
      manual_configuration:
        remote_table:
          name: matches
          schema: public
        column_mapping:
          match_id: id
  - name: match_map
    using:
      manual_configuration:
        remote_table:
          name: match_maps
          schema: public
        column_mapping:
          match_map_id: id
  - name: player
    using:
      manual_configuration:
        remote_table:
          name: players
          schema: public
        column_mapping:
          steam_id: steam_id
select_permissions:
  - role: guest
    permission:
      columns:
        - match_id
        - match_map_id
        - steam_id
        - lineup_id
        - rounds
        - kills
        - deaths
        - awp_kills
        - total_kills
        - opening_attempts
        - open_kills
        - open_deaths
        - trade_kill_successes
        - traded_death_successes
        - flash_assists
        - util_damage
        - hltv_rating
        - adr
        - kpr
        - dpr
        - kast_pct
        - awp_share
        - entry_rate
        - support_idx
        - role
      filter: {}
      allow_aggregations: true
    comment: ""
