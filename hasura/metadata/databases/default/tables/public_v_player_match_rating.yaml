table:
  name: v_player_match_rating
  schema: public
object_relationships:
  - name: match
    using:
      manual_configuration:
        remote_table:
          name: matches
          schema: public
        column_mapping:
          match_id: id
  - name: player
    using:
      manual_configuration:
        remote_table:
          name: players
          schema: public
        column_mapping:
          steam_id: steam_id
select_permissions:
  - role: guest
    permission:
      columns:
        - match_id
        - steam_id
        - rounds_played
        - hltv_rating
        - adr
        - kpr
        - dpr
        - kast_pct
      filter: {}
      allow_aggregations: true
    comment: ""
