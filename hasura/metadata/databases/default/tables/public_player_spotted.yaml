table:
  name: player_spotted
  schema: public
object_relationships:
  - name: match
    using:
      foreign_key_constraint_on: match_id
  - name: match_map
    using:
      foreign_key_constraint_on: match_map_id
  - name: spotter
    using:
      foreign_key_constraint_on: spotter_steam_id
  - name: spotted
    using:
      foreign_key_constraint_on: spotted_steam_id
select_permissions:
  - role: guest
    permission:
      columns:
        - id
        - match_id
        - match_map_id
        - round
        - tick
        - spotter_steam_id
        - spotted_steam_id
        - spotter_team
      filter: {}
      allow_aggregations: true
    comment: ""
