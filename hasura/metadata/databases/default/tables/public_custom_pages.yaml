table:
  name: custom_pages
  schema: public
insert_permissions:
  - role: administrator
    permission:
      check: {}
      columns:
        - slug
        - title
        - icon
        - remote_entry_url
        - remote_scope
        - exposed_module
        - required_role
        - enabled
        - is_default
        - nav_group
        - nav_order
        - deployments
    comment: ""
select_permissions:
  - role: administrator
    permission:
      columns:
        - id
        - slug
        - title
        - icon
        - remote_entry_url
        - remote_scope
        - exposed_module
        - required_role
        - enabled
        - is_default
        - nav_group
        - nav_order
        - deployments
        - created_at
        - updated_at
      filter: {}
      allow_aggregations: true
    comment: ""
  - role: guest
    permission:
      columns:
        - id
        - slug
        - title
        - icon
        - remote_entry_url
        - remote_scope
        - exposed_module
        - required_role
        - enabled
        - is_default
        - nav_group
        - nav_order
      filter:
        _and:
          - enabled:
              _eq: true
          - required_role:
              _is_null: true
    comment: ""
  - role: user
    permission:
      columns:
        - id
        - slug
        - title
        - icon
        - remote_entry_url
        - remote_scope
        - exposed_module
        - required_role
        - enabled
        - is_default
        - nav_group
        - nav_order
      filter:
        _and:
          - enabled:
              _eq: true
          - _or:
              - required_role:
                  _is_null: true
              - required_role:
                  _in:
                    - user
    comment: ""
