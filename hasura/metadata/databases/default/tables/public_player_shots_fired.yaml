table:
  name: player_shots_fired
  schema: public
object_relationships:
  - name: match
    using:
      foreign_key_constraint_on: match_id
  - name: match_map
    using:
      foreign_key_constraint_on: match_map_id
  # No DB-level FK on attacker_steam_id — the demo parser can emit shots
  # for steam_ids that never registered via GSI (bots, late spectators,
  # deleted accounts), and a hard FK would reject those inserts. The
  # GraphQL relationship is still useful when the player row happens to
  # exist, so we wire it manually instead.
  - name: player
    using:
      manual_configuration:
        column_mapping:
          attacker_steam_id: steam_id
        insertion_order: null
        remote_table:
          name: players
          schema: public
select_permissions:
  - role: guest
    permission:
      columns:
        - id
        - match_id
        - match_map_id
        - round
        - tick
        - attacker_steam_id
        - attacker_team
        - with
      filter: {}
      allow_aggregations: true
    comment: ""
