table:
  name: teams
  schema: public
object_relationships:
  - name: captain
    using:
      foreign_key_constraint_on: captain_steam_id
  - name: owner
    using:
      foreign_key_constraint_on: owner_steam_id
  - name: scrim_settings
    using:
      foreign_key_constraint_on:
        column: team_id
        table:
          name: team_scrim_settings
          schema: public
  - name: ranks
    using:
      manual_configuration:
        column_mapping:
          id: team_id
        insertion_order: null
        remote_table:
          name: v_team_ranks
          schema: public
  - name: reputation
    using:
      manual_configuration:
        column_mapping:
          id: team_id
        insertion_order: null
        remote_table:
          name: v_team_reputation
          schema: public
array_relationships:
  - name: scrim_availability
    using:
      foreign_key_constraint_on:
        column: team_id
        table:
          name: team_scrim_availability
          schema: public
  - name: invites
    using:
      foreign_key_constraint_on:
        column: team_id
        table:
          name: team_invites
          schema: public
  - name: match_lineups
    using:
      foreign_key_constraint_on:
        column: team_id
        table:
          name: match_lineups
          schema: public
  - name: roster
    using:
      foreign_key_constraint_on:
        column: team_id
        table:
          name: team_roster
          schema: public
  - name: tournament_teams
    using:
      foreign_key_constraint_on:
        column: team_id
        table:
          name: tournament_teams
          schema: public
computed_fields:
  - name: can_change_role
    definition:
      function:
        name: can_change_team_role
        schema: public
      session_argument: hasura_session
  - name: can_manage_scrims
    definition:
      function:
        name: can_manage_team_scrims
        schema: public
      session_argument: hasura_session
  - name: can_invite
    definition:
      function:
        name: can_invite_to_team
        schema: public
      session_argument: hasura_session
  - name: can_remove
    definition:
      function:
        name: can_remove_from_team
        schema: public
      session_argument: hasura_session
  - name: matches
    definition:
      function:
        name: get_team_matches
        schema: public
  - name: role
    definition:
      function:
        name: team_role
        schema: public
      session_argument: hasura_session
insert_permissions:
  - role: user
    permission:
      check: {}
      set:
        owner_steam_id: x-hasura-user-id
      columns:
        - name
        - short_name
    comment: ""
select_permissions:
  - role: guest
    permission:
      columns:
        - avatar_url
        - captain_steam_id
        - id
        - is_organization
        - name
        - owner_steam_id
        - short_name
      computed_fields:
        - can_change_role
        - can_invite
        - can_manage_scrims
        - can_remove
        - role
      filter: {}
      allow_aggregations: true
    comment: ""
update_permissions:
  - role: tournament_organizer
    permission:
      columns:
        - captain_steam_id
        - is_organization
        - name
        - owner_steam_id
        - short_name
      filter: {}
      check: null
    comment: ""
  - role: user
    permission:
      columns:
        - captain_steam_id
        - name
        - owner_steam_id
        - short_name
      filter:
        _or:
          - owner_steam_id:
              _eq: X-Hasura-User-Id
          - roster:
              _and:
                - role:
                    _eq: Admin
                - player_steam_id:
                    _eq: X-Hasura-User-Id
      check: {}
    comment: ""
delete_permissions:
  - role: tournament_organizer
    permission:
      filter: {}
    comment: ""
  - role: user
    permission:
      filter:
        owner_steam_id:
          _eq: x-hasura-user-id
    comment: ""
