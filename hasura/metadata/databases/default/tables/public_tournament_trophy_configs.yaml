table:
  name: tournament_trophy_configs
  schema: public
object_relationships:
  - name: tournament
    using:
      foreign_key_constraint_on: tournament_id
insert_permissions:
  # admin keeps a permissive `check: {}` so it can seed configs on
  # tournaments it doesn't own. All other authed roles inherit the
  # `user` rule (must be the tournament organizer).
  - role: administrator
    permission:
      check: {}
      columns:
        - tournament_id
        - placement
        - custom_name
        - silhouette
        - image_url
    comment: ""
  - role: user
    permission:
      check:
        tournament:
          is_organizer:
            _eq: true
      columns:
        - tournament_id
        - placement
        - custom_name
        - silhouette
        - image_url
    comment: ""
select_permissions:
  - role: guest
    permission:
      columns:
        - id
        - tournament_id
        - placement
        - custom_name
        - silhouette
        - image_url
        - created_at
        - updated_at
      filter: {}
    comment: ""
update_permissions:
  - role: user
    permission:
      columns:
        - custom_name
        - silhouette
        - image_url
      filter:
        tournament:
          is_organizer:
            _eq: true
      check: null
    comment: ""
delete_permissions:
  - role: user
    permission:
      filter:
        tournament:
          is_organizer:
            _eq: true
    comment: ""
