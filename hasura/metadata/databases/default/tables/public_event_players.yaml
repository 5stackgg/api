table:
  name: event_players
  schema: public
object_relationships:
  - name: event
    using:
      foreign_key_constraint_on: event_id
  - name: player
    using:
      foreign_key_constraint_on: steam_id
insert_permissions:
  - role: user
    permission:
      check:
        event:
          is_organizer:
            _eq: true
      columns:
        - event_id
        - steam_id
    comment: ""
select_permissions:
  - role: guest
    permission:
      columns:
        - created_at
        - event_id
        - steam_id
      filter:
        event:
          visibility:
            _eq: Public
      allow_aggregations: true
    comment: ""
  - role: user
    permission:
      columns:
        - created_at
        - event_id
        - steam_id
      filter:
        event:
          can_view:
            _eq: true
      allow_aggregations: true
    comment: ""
delete_permissions:
  - role: user
    permission:
      filter:
        event:
          is_organizer:
            _eq: true
    comment: ""
