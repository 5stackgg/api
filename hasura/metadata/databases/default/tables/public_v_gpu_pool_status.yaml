      columns:
        - id
        - total_gpu_nodes
        - free_gpu_nodes
        - free_gpu_nodes_for_batch
        - renders_paused_for_active_match
        - registered_gpu_nodes
        - live_in_progress
        - demo_in_progress
        - highlights_in_progress
        - streaming_total_gpu_nodes
        - streaming_free_gpu_nodes
        - demo_total_gpu_nodes
        - demo_free_gpu_nodes
        - rendering_total_gpu_nodes
      filter: {}
    comment: ""
