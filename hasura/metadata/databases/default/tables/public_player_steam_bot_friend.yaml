table:
  name: player_steam_bot_friend
  schema: public
object_relationships:
  - name: player
    using:
      foreign_key_constraint_on: steam_id
select_permissions:
  - role: user
    permission:
      columns:
        - steam_id
        - bot_steamid64
        - status
        - last_presence_state
        - friended_at
        - created_at
        - updated_at
      filter:
        steam_id:
          _eq: X-Hasura-User-Id
    comment: ""
