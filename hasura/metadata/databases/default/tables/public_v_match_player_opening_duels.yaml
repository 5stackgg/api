table:
  name: v_match_player_opening_duels
  schema: public
object_relationships:
  - name: match
    using:
      manual_configuration:
        remote_table:
          name: matches
          schema: public
        column_mapping:
          match_id: id
  - name: match_map
    using:
      manual_configuration:
        remote_table:
          name: match_maps
          schema: public
        column_mapping:
          match_map_id: id
  - name: match_lineup
    using:
      manual_configuration:
        remote_table:
          name: match_lineups
          schema: public
        column_mapping:
          match_lineup_id: id
  - name: player
    using:
      manual_configuration:
        remote_table:
          name: players
          schema: public
        column_mapping:
          steam_id: steam_id
select_permissions:
  - role: guest
    permission:
      columns:
        - match_id
        - match_map_id
        - match_lineup_id
        - steam_id
        - side
        - attempts
        - wins
        - deaths
        - traded_deaths
      filter: {}
      allow_aggregations: true
    comment: ""
