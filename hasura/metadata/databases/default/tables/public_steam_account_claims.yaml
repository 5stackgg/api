table:
  name: steam_account_claims
  schema: public
object_relationships:
  - name: steam_account
    using:
      foreign_key_constraint_on: steam_account_id
  - name: node
    using:
      foreign_key_constraint_on: node_id
select_permissions:
  - role: administrator
    permission:
      columns:
        - id
        - steam_account_id
        - node_id
        - k8s_job_name
        - purpose
        - created_at
      filter: {}
      allow_aggregations: true
    comment: ""
