table:
  name: tournament_trophies
  schema: public
object_relationships:
  - name: player
    using:
      foreign_key_constraint_on: player_steam_id
  - name: team
    using:
      foreign_key_constraint_on: team_id
  - name: tournament
    using:
      foreign_key_constraint_on: tournament_id
  - name: tournament_team
    using:
      foreign_key_constraint_on: tournament_team_id
  - name: trophy_config
    using:
      manual_configuration:
        column_mapping:
          placement: placement
          tournament_id: tournament_id
        insertion_order: null
        remote_table:
          name: tournament_trophy_configs
          schema: public
insert_permissions:
  # Every authed role inherits from `user`, so this single permission
  # also lets verified_user / streamer / match_organizer /
  # tournament_organizer / administrator manually award trophies for
  # tournaments they organize.
  - role: user
    permission:
      check:
        tournament:
          is_organizer:
            _eq: true
      set:
        manual: "true"
      columns:
        - tournament_id
        - tournament_team_id
        - player_steam_id
        - placement
    comment: ""
select_permissions:
  # filter:{} is fine for guest; all higher roles inherit from guest.
  - role: guest
    permission:
      columns:
        - id
        - tournament_id
        - tournament_team_id
        - team_id
        - player_steam_id
        - placement
        - placement_tier
        - manual
        - created_at
      filter: {}
      allow_aggregations: true
    comment: ""
delete_permissions:
  - role: user
    permission:
      filter:
        tournament:
          is_organizer:
            _eq: true
    comment: ""
