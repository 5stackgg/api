table:
  name: tournament_trophies
  schema: public
object_relationships:
  - name: tournament
    using:
      foreign_key_constraint_on: tournament_id
  - name: tournament_team
    using:
      foreign_key_constraint_on: tournament_team_id
  - name: player
    using:
      foreign_key_constraint_on: player_steam_id
  - name: team
    using:
      foreign_key_constraint_on: team_id
  - name: trophy_config
    using:
      manual_configuration:
        remote_table:
          schema: public
          name: tournament_trophy_configs
        column_mapping:
          tournament_id: tournament_id
          placement: placement
        insertion_order: null
insert_permissions:
  - role: tournament_organizer
    permission:
      check:
        tournament:
          is_organizer:
            _eq: true
      set:
        manual: "true"
      columns:
        - tournament_id
        - tournament_team_id
        - player_steam_id
        - placement
    comment: ""
  - role: user
    permission:
      check:
        tournament:
          is_organizer:
            _eq: true
      set:
        manual: "true"
      columns:
        - tournament_id
        - tournament_team_id
        - player_steam_id
        - placement
    comment: ""
select_permissions:
  - role: guest
    permission:
      columns:
        - id
        - tournament_id
        - tournament_team_id
        - team_id
        - player_steam_id
        - placement
        - placement_tier
        - manual
        - created_at
      filter: {}
      allow_aggregations: true
    comment: ""
  - role: user
    permission:
      columns:
        - id
        - tournament_id
        - tournament_team_id
        - team_id
        - player_steam_id
        - placement
        - placement_tier
        - manual
        - created_at
      filter: {}
      allow_aggregations: true
    comment: ""
  - role: match_organizer
    permission:
      columns:
        - id
        - tournament_id
        - tournament_team_id
        - team_id
        - player_steam_id
        - placement
        - placement_tier
        - manual
        - created_at
      filter: {}
      allow_aggregations: true
    comment: ""
  - role: tournament_organizer
    permission:
      columns:
        - id
        - tournament_id
        - tournament_team_id
        - team_id
        - player_steam_id
        - placement
        - placement_tier
        - manual
        - created_at
      filter: {}
      allow_aggregations: true
    comment: ""
delete_permissions:
  - role: tournament_organizer
    permission:
      filter:
        tournament:
          is_organizer:
            _eq: true
    comment: ""
  - role: user
    permission:
      filter:
        tournament:
          is_organizer:
            _eq: true
    comment: ""
