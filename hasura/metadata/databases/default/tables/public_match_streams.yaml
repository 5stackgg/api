table:
  name: match_streams
  schema: public
object_relationships:
  - name: match
    using:
      foreign_key_constraint_on: match_id
insert_permissions:
  - role: match_organizer
    permission:
      check:
        is_game_streamer:
          _eq: false
      columns:
        - link
        - match_id
        - priority
        - title
    comment: ""
  - role: streamer
    permission:
      check:
        is_game_streamer:
          _eq: false
      columns:
        - link
        - match_id
        - priority
        - title
    comment: ""
  - role: user
    permission:
      check:
        _and:
          - match:
              is_organizer:
                _eq: true
          - is_game_streamer:
              _eq: false
      columns:
        - link
        - match_id
        - priority
        - title
    comment: ""
select_permissions:
  - role: guest
    permission:
      columns:
        - priority
        - link
        - title
        - id
        - match_id
        - is_game_streamer
        - is_live
        - status
        - stream_url
        - error_message
        - last_status_at
        - autodirector
      filter: {}
    comment: ""
update_permissions:
  - role: match_organizer
    permission:
      columns:
        - link
        - priority
        - title
      filter:
        is_game_streamer:
          _eq: false
      check:
        is_game_streamer:
          _eq: false
    comment: ""
  - role: streamer
    permission:
      columns:
        - link
        - priority
        - title
      filter:
        is_game_streamer:
          _eq: false
      check:
        is_game_streamer:
          _eq: false
    comment: ""
  - role: user
    permission:
      columns:
        - link
        - priority
        - title
      filter:
        _and:
          - match:
              is_organizer:
                _eq: true
          - is_game_streamer:
              _eq: false
      check:
        _and:
          - match:
              is_organizer:
                _eq: true
          - is_game_streamer:
              _eq: false
    comment: ""
delete_permissions:
  - role: match_organizer
    permission:
      filter:
        is_game_streamer:
          _eq: false
    comment: ""
  - role: streamer
    permission:
      filter:
        is_game_streamer:
          _eq: false
    comment: ""
  - role: user
    permission:
      filter:
        _and:
          - match:
              is_organizer:
                _eq: true
          - is_game_streamer:
              _eq: false
    comment: ""
