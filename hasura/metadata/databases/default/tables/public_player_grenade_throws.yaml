table:
  name: player_grenade_throws
  schema: public
object_relationships:
  - name: match
    using:
      foreign_key_constraint_on: match_id
  - name: match_map
    using:
      foreign_key_constraint_on: match_map_id
  # Manual configuration (no DB FK) — see public_player_shots_fired.yaml
  # for rationale. thrower_steam_id is also nullable here because mollies
  # have nil thrower in Source 2 demos, which makes a DB FK extra awkward.
  - name: thrower
    using:
      manual_configuration:
        column_mapping:
          thrower_steam_id: steam_id
        insertion_order: null
        remote_table:
          name: players
          schema: public
select_permissions:
  - role: guest
    permission:
      columns:
        - id
        - match_id
        - match_map_id
        - round
        - tick
        - thrower_steam_id
        - thrower_team
        - type
        - phase
        - x
        - y
        - z
      filter: {}
      allow_aggregations: true
    comment: ""
