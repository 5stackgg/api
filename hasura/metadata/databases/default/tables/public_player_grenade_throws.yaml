table:
  name: player_grenade_throws
  schema: public
object_relationships:
  - name: match
    using:
      foreign_key_constraint_on: match_id
  - name: match_map
    using:
      foreign_key_constraint_on: match_map_id
  - name: thrower
    using:
      foreign_key_constraint_on: thrower_steam_id
select_permissions:
  - role: guest
    permission:
      columns:
        - id
        - match_id
        - match_map_id
        - round
        - tick
        - thrower_steam_id
        - thrower_team
        - type
        - phase
        - x
        - y
        - z
      filter: {}
      allow_aggregations: true
    comment: ""
