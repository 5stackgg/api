table:
  name: player_match_map_stats
  schema: public
object_relationships:
  - name: player
    using:
      foreign_key_constraint_on: steam_id
  - name: match
    using:
      foreign_key_constraint_on: match_id
  - name: match_map
    using:
      foreign_key_constraint_on: match_map_id
select_permissions:
  - role: guest
    permission:
      columns:
        - steam_id
        - match_id
        - match_map_id
        - kills
        - hs_kills
        - knife_kills
        - zeus_kills
        - assists
        - flash_assists
        - deaths
        - damage
        - team_damage
        - he_damage
        - molotov_damage
        - he_team_damage
        - flashes_thrown
        - enemies_flashed
        - team_flashed
        - flash_duration_sum
        - flash_duration_count
        - two_kill_rounds
        - three_kill_rounds
        - four_kill_rounds
        - five_kill_rounds
        - trade_kill_opportunities
        - trade_kill_attempts
        - trade_kill_successes
        - traded_death_opportunities
        - traded_death_attempts
        - traded_death_successes
        - shots_fired
        - wasted_magazine_shots
        - unused_utility_value
        - kills_t
        - kills_ct
        - hs_kills_t
        - hs_kills_ct
        - deaths_t
        - deaths_ct
        - damage_t
        - damage_ct
        - assists_t
        - assists_ct
        - rounds_t
        - rounds_ct
        - hits
        - headshot_hits
        - time_to_damage_sum_s
        - time_to_damage_count
        - spotted_count
        - spotted_with_damage_count
        - he_throws
        - molotov_throws
        - smoke_throws
        - decoy_throws
        - counter_strafed_shots
        - counter_strafe_eligible_shots
        - crosshair_angle_sum_deg
        - crosshair_angle_count
        - non_awp_hits
        - hits_at_spotted
        - shots_at_spotted
        - spray_shots
        - spray_hits
        - rounds_played
        - updated_at
      filter: {}
      allow_aggregations: true
    comment: ""
