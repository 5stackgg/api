table:
  name: events
  schema: public
object_relationships:
  - name: banner
    using:
      foreign_key_constraint_on: banner_media_id
  - name: organizer
    using:
      foreign_key_constraint_on: organizer_steam_id
array_relationships:
  - name: media
    using:
      foreign_key_constraint_on:
        column: event_id
        table:
          name: event_media
          schema: public
  - name: organizers
    using:
      foreign_key_constraint_on:
        column: event_id
        table:
          name: event_organizers
          schema: public
  - name: player_stats
    using:
      manual_configuration:
        column_mapping:
          id: event_id
        insertion_order: null
        remote_table:
          name: v_event_player_stats
          schema: public
  - name: players
    using:
      foreign_key_constraint_on:
        column: event_id
        table:
          name: event_players
          schema: public
  - name: teams
    using:
      foreign_key_constraint_on:
        column: event_id
        table:
          name: event_teams
          schema: public
  - name: tournaments
    using:
      foreign_key_constraint_on:
        column: event_id
        table:
          name: event_tournaments
          schema: public
computed_fields:
  - name: can_upload_media
    definition:
      function:
        name: can_upload_event_media
        schema: public
      session_argument: hasura_session
  - name: can_view
    definition:
      function:
        name: can_view_event
        schema: public
      session_argument: hasura_session
  - name: is_organizer
    definition:
      function:
        name: is_event_organizer
        schema: public
      session_argument: hasura_session
insert_permissions:
  - role: administrator
    permission:
      check:
        _exists:
          _table:
            name: settings
            schema: public
          _where:
            _and:
              - name:
                  _eq: public.events_enabled
              - value:
                  _eq: "true"
      set:
        organizer_steam_id: x-hasura-user-id
      columns:
        - description
        - ends_at
        - media_access
        - name
        - starts_at
        - visibility
    comment: ""
  - role: match_organizer
    permission:
      check:
        _and:
          - _exists:
              _table:
                name: settings
                schema: public
              _where:
                _and:
                  - name:
                      _eq: public.events_enabled
                  - value:
                      _eq: "true"
          - _or:
              - _not:
                  _exists:
                    _table:
                      name: settings
                      schema: public
                    _where:
                      name:
                        _eq: public.create_events_role
              - _exists:
                  _table:
                    name: settings
                    schema: public
                  _where:
                    _and:
                      - name:
                          _eq: public.create_events_role
                      - value:
                          _in:
                            - user
                            - verified_user
                            - streamer
                            - moderator
                            - match_organizer
      set:
        organizer_steam_id: x-hasura-user-id
      columns:
        - description
        - ends_at
        - media_access
        - name
        - starts_at
        - visibility
    comment: ""
  - role: tournament_organizer
    permission:
      check:
        _and:
          - _exists:
              _table:
                name: settings
                schema: public
              _where:
                _and:
                  - name:
                      _eq: public.events_enabled
                  - value:
                      _eq: "true"
          - _or:
              - _not:
                  _exists:
                    _table:
                      name: settings
                      schema: public
                    _where:
                      name:
                        _eq: public.create_events_role
              - _exists:
                  _table:
                    name: settings
                    schema: public
                  _where:
                    _and:
                      - name:
                          _eq: public.create_events_role
                      - value:
                          _in:
                            - user
                            - verified_user
                            - streamer
                            - moderator
                            - match_organizer
                            - tournament_organizer
      set:
        organizer_steam_id: x-hasura-user-id
      columns:
        - description
        - ends_at
        - media_access
        - name
        - starts_at
        - visibility
    comment: ""
select_permissions:
  - role: guest
    permission:
      columns:
        - banner_media_id
        - created_at
        - description
        - ends_at
        - hide_creator_organizer
        - id
        - media_access
        - name
        - organizer_steam_id
        - starts_at
        - visibility
      computed_fields:
        - can_upload_media
        - can_view
        - is_organizer
      filter:
        visibility:
          _eq: Public
      allow_aggregations: true
    comment: ""
  - role: tournament_organizer
    permission:
      columns:
        - banner_media_id
        - created_at
        - description
        - ends_at
        - hide_creator_organizer
        - id
        - media_access
        - name
        - organizer_steam_id
        - starts_at
        - visibility
      computed_fields:
        - can_upload_media
        - can_view
        - is_organizer
      filter:
        can_view:
          _eq: true
      allow_aggregations: true
    comment: ""
  - role: user
    permission:
      columns:
        - banner_media_id
        - created_at
        - description
        - ends_at
        - hide_creator_organizer
        - id
        - media_access
        - name
        - organizer_steam_id
        - starts_at
        - visibility
      computed_fields:
        - can_upload_media
        - can_view
        - is_organizer
      filter:
        can_view:
          _eq: true
      allow_aggregations: true
    comment: ""
update_permissions:
  - role: tournament_organizer
    permission:
      columns:
        - banner_media_id
        - description
        - ends_at
        - hide_creator_organizer
        - media_access
        - name
        - starts_at
        - visibility
      filter:
        is_organizer:
          _eq: true
      check:
        is_organizer:
          _eq: true
    comment: ""
  - role: user
    permission:
      columns:
        - banner_media_id
        - description
        - ends_at
        - hide_creator_organizer
        - media_access
        - name
        - starts_at
        - visibility
      filter:
        is_organizer:
          _eq: true
      check:
        is_organizer:
          _eq: true
    comment: ""
delete_permissions:
  - role: tournament_organizer
    permission:
      filter: {}
    comment: ""
  - role: user
    permission:
      filter:
        organizer_steam_id:
          _eq: X-Hasura-User-Id
    comment: ""
event_triggers:
  - name: events
    definition:
      delete:
        columns: '*'
      enable_manual: false
    retry_conf:
      interval_sec: 10
      num_retries: 6
      timeout_sec: 60
    webhook: '{{HASURA_GRAPHQL_EVENT_HOOK}}'
