table:
  name: events
  schema: public
object_relationships:
  - name: organizer
    using:
      foreign_key_constraint_on: organizer_steam_id
array_relationships:
  - name: organizers
    using:
      foreign_key_constraint_on:
        column: event_id
        table:
          name: event_organizers
          schema: public
  - name: player_stats
    using:
      manual_configuration:
        column_mapping:
          id: event_id
        insertion_order: null
        remote_table:
          name: v_event_player_stats
          schema: public
  - name: players
    using:
      foreign_key_constraint_on:
        column: event_id
        table:
          name: event_players
          schema: public
  - name: teams
    using:
      foreign_key_constraint_on:
        column: event_id
        table:
          name: event_teams
          schema: public
  - name: tournaments
    using:
      foreign_key_constraint_on:
        column: event_id
        table:
          name: event_tournaments
          schema: public
computed_fields:
  - name: is_organizer
    definition:
      function:
        name: is_event_organizer
        schema: public
      session_argument: hasura_session
insert_permissions:
  - role: administrator
    permission:
      check: {}
      set:
        organizer_steam_id: x-hasura-user-id
      columns:
        - description
        - ends_at
        - name
        - starts_at
    comment: ""
  - role: match_organizer
    permission:
      check:
        _or:
          - _not:
              _exists:
                _table:
                  name: settings
                  schema: public
                _where:
                  name:
                    _eq: public.create_events_role
          - _exists:
              _table:
                name: settings
                schema: public
              _where:
                _and:
                  - name:
                      _eq: public.create_events_role
                  - value:
                      _in:
                        - user
                        - verified_user
                        - streamer
                        - moderator
                        - match_organizer
      set:
        organizer_steam_id: x-hasura-user-id
      columns:
        - description
        - ends_at
        - name
        - starts_at
    comment: ""
  - role: moderator
    permission:
      check:
        _or:
          - _not:
              _exists:
                _table:
                  name: settings
                  schema: public
                _where:
                  name:
                    _eq: public.create_events_role
          - _exists:
              _table:
                name: settings
                schema: public
              _where:
                _and:
                  - name:
                      _eq: public.create_events_role
                  - value:
                      _in:
                        - user
                        - verified_user
                        - streamer
                        - moderator
      set:
        organizer_steam_id: x-hasura-user-id
      columns:
        - description
        - ends_at
        - name
        - starts_at
    comment: ""
  - role: streamer
    permission:
      check:
        _or:
          - _not:
              _exists:
                _table:
                  name: settings
                  schema: public
                _where:
                  name:
                    _eq: public.create_events_role
          - _exists:
              _table:
                name: settings
                schema: public
              _where:
                _and:
                  - name:
                      _eq: public.create_events_role
                  - value:
                      _in:
                        - user
                        - verified_user
                        - streamer
      set:
        organizer_steam_id: x-hasura-user-id
      columns:
        - description
        - ends_at
        - name
        - starts_at
    comment: ""
  - role: tournament_organizer
    permission:
      check:
        _or:
          - _not:
              _exists:
                _table:
                  name: settings
                  schema: public
                _where:
                  name:
                    _eq: public.create_events_role
          - _exists:
              _table:
                name: settings
                schema: public
              _where:
                _and:
                  - name:
                      _eq: public.create_events_role
                  - value:
                      _in:
                        - user
                        - verified_user
                        - streamer
                        - moderator
                        - match_organizer
                        - tournament_organizer
      set:
        organizer_steam_id: x-hasura-user-id
      columns:
        - description
        - ends_at
        - name
        - starts_at
    comment: ""
  - role: user
    permission:
      check:
        _or:
          - _not:
              _exists:
                _table:
                  name: settings
                  schema: public
                _where:
                  name:
                    _eq: public.create_events_role
          - _exists:
              _table:
                name: settings
                schema: public
              _where:
                _and:
                  - name:
                      _eq: public.create_events_role
                  - value:
                      _in:
                        - user
      set:
        organizer_steam_id: x-hasura-user-id
      columns:
        - description
        - ends_at
        - name
        - starts_at
    comment: ""
  - role: verified_user
    permission:
      check:
        _or:
          - _not:
              _exists:
                _table:
                  name: settings
                  schema: public
                _where:
                  name:
                    _eq: public.create_events_role
          - _exists:
              _table:
                name: settings
                schema: public
              _where:
                _and:
                  - name:
                      _eq: public.create_events_role
                  - value:
                      _in:
                        - user
                        - verified_user
      set:
        organizer_steam_id: x-hasura-user-id
      columns:
        - description
        - ends_at
        - name
        - starts_at
    comment: ""
select_permissions:
  - role: guest
    permission:
      columns:
        - created_at
        - description
        - ends_at
        - id
        - name
        - organizer_steam_id
        - starts_at
        - status
      computed_fields:
        - is_organizer
      filter:
        status:
          _neq: Setup
      allow_aggregations: true
    comment: ""
  - role: tournament_organizer
    permission:
      columns:
        - created_at
        - description
        - ends_at
        - id
        - name
        - organizer_steam_id
        - starts_at
        - status
      computed_fields:
        - is_organizer
      filter:
        _or:
          - is_organizer:
              _eq: true
          - status:
              _neq: Setup
      allow_aggregations: true
    comment: ""
  - role: user
    permission:
      columns:
        - created_at
        - description
        - ends_at
        - id
        - name
        - organizer_steam_id
        - starts_at
        - status
      computed_fields:
        - is_organizer
      filter:
        _or:
          - is_organizer:
              _eq: true
          - status:
              _neq: Setup
      allow_aggregations: true
    comment: ""
update_permissions:
  - role: tournament_organizer
    permission:
      columns:
        - description
        - ends_at
        - name
        - starts_at
        - status
      filter:
        is_organizer:
          _eq: true
      check:
        is_organizer:
          _eq: true
    comment: ""
  - role: user
    permission:
      columns:
        - description
        - ends_at
        - name
        - starts_at
        - status
      filter:
        is_organizer:
          _eq: true
      check:
        is_organizer:
          _eq: true
    comment: ""
delete_permissions:
  - role: tournament_organizer
    permission:
      filter: {}
    comment: ""
  - role: user
    permission:
      filter:
        organizer_steam_id:
          _eq: X-Hasura-User-Id
    comment: ""
