table:
  name: clip_render_jobs
  schema: public
object_relationships:
  - name: clip
    using:
      foreign_key_constraint_on: clip_id
  - name: match_map
    using:
      foreign_key_constraint_on: match_map_id
  - name: user
    using:
      foreign_key_constraint_on: user_steam_id
select_permissions:
  - role: administrator
    permission:
      columns:
        - id
        - user_steam_id
        - match_map_id
        - status
        - progress
        - error_message
        - clip_id
        - status_history
        - last_status_at
        - created_at
        - spec
      filter: {}
  # Operator-tier roles see EVERY clip_render_jobs row, not just
  # their own — they're the people running Manage Highlights and
  # need to see auto-gen jobs spawned under other operators' matches
  # too. Plain `user` / `verified_user` still see only their own
  # personal Library renders below.
  - role: match_organizer
    permission:
      columns:
        - id
        - user_steam_id
        - match_map_id
        - status
        - progress
        - error_message
        - clip_id
        - status_history
        - last_status_at
        - created_at
        - spec
      filter: {}
  - role: streamer
    permission:
      columns:
        - id
        - user_steam_id
        - match_map_id
        - status
        - progress
        - error_message
        - clip_id
        - status_history
        - last_status_at
        - created_at
        - spec
      filter: {}
  - role: tournament_organizer
    permission:
      columns:
        - id
        - user_steam_id
        - match_map_id
        - status
        - progress
        - error_message
        - clip_id
        - status_history
        - last_status_at
        - created_at
        - spec
      filter: {}
  - role: user
    permission:
      columns:
        - id
        - user_steam_id
        - match_map_id
        - status
        - progress
        - error_message
        - clip_id
        - status_history
        - last_status_at
        - created_at
        - spec
      filter:
        user_steam_id:
          _eq: X-Hasura-User-Id
  - role: verified_user
    permission:
      columns:
        - id
        - user_steam_id
        - match_map_id
        - status
        - progress
        - error_message
        - clip_id
        - status_history
        - last_status_at
        - created_at
        - spec
      filter:
        user_steam_id:
          _eq: X-Hasura-User-Id
