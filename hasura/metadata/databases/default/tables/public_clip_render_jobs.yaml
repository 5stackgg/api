table:
  name: clip_render_jobs
  schema: public
object_relationships:
  - name: clip
    using:
      foreign_key_constraint_on: clip_id
  - name: game_server_node
    using:
      foreign_key_constraint_on: game_server_node_id
  - name: match_map
    using:
      foreign_key_constraint_on: match_map_id
  - name: match_map_demo
    using:
      foreign_key_constraint_on: match_map_demo_id
  - name: user
    using:
      foreign_key_constraint_on: user_steam_id
select_permissions:
  - role: administrator
    permission:
      columns:
        - id
        - user_steam_id
        - match_map_id
        - match_map_demo_id
        - status
        - progress
        - error_message
        - clip_id
        - status_history
        - last_status_at
        - created_at
        - sort_index
        - spec
        - game_server_node_id
        - paused
      filter: {}
      allow_aggregations: true
  - role: match_organizer
    permission:
      columns:
        - id
        - user_steam_id
        - match_map_id
        - match_map_demo_id
        - status
        - progress
        - error_message
        - clip_id
        - status_history
        - last_status_at
        - created_at
        - sort_index
        - spec
        - game_server_node_id
        - paused
      filter: {}
  - role: streamer
    permission:
      columns:
        - id
        - user_steam_id
        - match_map_id
        - match_map_demo_id
        - status
        - progress
        - error_message
        - clip_id
        - status_history
        - last_status_at
        - created_at
        - sort_index
        - spec
        - game_server_node_id
        - paused
      filter: {}
  - role: user
    permission:
      columns:
        - id
        - user_steam_id
        - match_map_id
        - match_map_demo_id
        - status
        - progress
        - error_message
        - clip_id
        - status_history
        - last_status_at
        - created_at
        - sort_index
        - spec
        - paused
      filter:
        user_steam_id:
          _eq: X-Hasura-User-Id
