table:
  name: league_season_divisions
  schema: public
object_relationships:
  - name: season
    using:
      foreign_key_constraint_on: league_season_id
  - name: division
    using:
      foreign_key_constraint_on: league_division_id
  - name: tournament
    using:
      foreign_key_constraint_on: tournament_id
array_relationships:
  - name: standings
    using:
      manual_configuration:
        column_mapping:
          id: league_season_division_id
        insertion_order: null
        remote_table:
          name: v_league_division_standings
          schema: public
insert_permissions:
  - role: administrator
    permission:
      check: {}
      columns:
        - league_season_id
        - league_division_id
    comment: ""
select_permissions:
  - role: guest
    permission:
      columns:
        - id
        - league_season_id
        - league_division_id
        - tournament_id
        - created_at
      filter: {}
    comment: ""
delete_permissions:
  - role: administrator
    permission:
      filter:
        tournament_id:
          _is_null: true
    comment: ""
