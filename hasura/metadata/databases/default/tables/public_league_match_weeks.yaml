table:
  name: league_match_weeks
  schema: public
object_relationships:
  - name: season
    using:
      foreign_key_constraint_on: league_season_id
insert_permissions:
  - role: administrator
    permission:
      check: {}
      columns:
        - league_season_id
        - week_number
        - opens_at
        - closes_at
        - default_match_at
    comment: ""
select_permissions:
  - role: guest
    permission:
      columns:
        - id
        - league_season_id
        - week_number
        - opens_at
        - closes_at
        - default_match_at
        - created_at
      filter: {}
    comment: ""
update_permissions:
  - role: administrator
    permission:
      columns:
        - week_number
        - opens_at
        - closes_at
        - default_match_at
      filter: {}
      check: {}
    comment: ""
delete_permissions:
  - role: administrator
    permission:
      filter: {}
    comment: ""
