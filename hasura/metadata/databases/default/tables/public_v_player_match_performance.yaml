table:
  name: v_player_match_performance
  schema: public
object_relationships:
  - name: map
    using:
      manual_configuration:
        column_mapping:
          map_id: id
        insertion_order: null
        remote_table:
          name: maps
          schema: public
  - name: match
    using:
      manual_configuration:
        column_mapping:
          match_id: id
        insertion_order: null
        remote_table:
          name: matches
          schema: public
select_permissions:
  - role: guest
    permission:
      columns:
        - player_steam_id
        - match_id
        - source
        - match_created_at
        - type
        - map_id
        - kills
        - deaths
        - assists
        - match_result
      filter: {}
      allow_aggregations: true
    comment: ""
