table:
  name: v_event_player_stats
  schema: public
object_relationships:
  - name: event
    using:
      manual_configuration:
        column_mapping:
          event_id: id
        insertion_order: null
        remote_table:
          name: events
          schema: public
  - name: player
    using:
      manual_configuration:
        column_mapping:
          player_steam_id: steam_id
        insertion_order: null
        remote_table:
          name: players
          schema: public
select_permissions:
  - role: guest
    permission:
      columns:
        - event_id
        - player_steam_id
        - kills
        - headshots
        - deaths
        - assists
        - matches_played
        - kdr
        - headshot_percentage
      filter:
        event:
          status:
            _neq: Setup
      allow_aggregations: true
    comment: ""
  - role: user
    permission:
      columns:
        - event_id
        - player_steam_id
        - kills
        - headshots
        - deaths
        - assists
        - matches_played
        - kdr
        - headshot_percentage
      filter:
        _or:
          - event:
              is_organizer:
                _eq: true
          - event:
              status:
                _neq: Setup
      allow_aggregations: true
    comment: ""
