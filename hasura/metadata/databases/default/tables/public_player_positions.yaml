table:
  name: player_positions
  schema: public
object_relationships:
  - name: match
    using:
      foreign_key_constraint_on: match_id
  - name: match_map
    using:
      foreign_key_constraint_on: match_map_id
  - name: player
    using:
      manual_configuration:
        column_mapping:
          attacker_steam_id: steam_id
        insertion_order: null
        remote_table:
          name: players
          schema: public
select_permissions:
  - role: guest
    permission:
      columns:
        - match_id
        - match_map_id
        - round
        - tick
        - attacker_steam_id
        - attacker_team
        - alive
        - x
        - y
        - z
        - yaw
        - health
      filter: {}
      allow_aggregations: true
    comment: ""
