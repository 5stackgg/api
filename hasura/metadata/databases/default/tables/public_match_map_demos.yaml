table:
  name: match_map_demos
  schema: public
object_relationships:
  - name: match
    using:
      foreign_key_constraint_on: match_id
  - name: match_map
    using:
      foreign_key_constraint_on: match_map_id
computed_fields:
  - name: download_url
    definition:
      function:
        name: demo_download_url
        schema: public
select_permissions:
  - role: guest
    permission:
      columns:
        - id
        - match_id
        - match_map_id
        - size
        - total_ticks
        - tick_rate
        - duration_seconds
        - round_ticks
        - metadata_parsed_at
        - map_name
        - workshop_id
        - cs2_build
        - kills
        - bombs
      computed_fields:
        - download_url
      filter: {}
      allow_aggregations: true
    comment: ""
event_triggers:
  # Fires the match_map_demo_events handler in matches.controller.
  # Used to kick off auto-clip generation the moment metadata parse
  # completes — that's the first point a ClipSpec can be built (we
  # need parsed kills + round_ticks). Triggered on the metadata_*
  # column change rather than every row update so we don't run the
  # handler when unrelated columns (size, file checksum, etc.)
  # change.
  - name: match_map_demo_events
    definition:
      enable_manual: false
      insert:
        columns: '*'
      update:
        columns:
          - metadata_parsed_at
          - file
    retry_conf:
      interval_sec: 10
      num_retries: 3
      timeout_sec: 60
    webhook: '{{HASURA_GRAPHQL_EVENT_HOOK}}'
