table:
  name: draft_game_players
  schema: public
object_relationships:
  - name: draft_game
    using:
      foreign_key_constraint_on: draft_game_id
  - name: e_draft_game_player_status
    using:
      foreign_key_constraint_on: status
  - name: player
    using:
      foreign_key_constraint_on: steam_id
select_permissions:
  - role: user
    permission:
      columns:
        - draft_game_id
        - steam_id
        - status
        - joined_at
        - elo_snapshot
        - is_captain
        - lineup
        - pick_order
      filter:
        _or:
          - steam_id:
              _eq: X-Hasura-User-Id
          - draft_game:
              _or:
                - access:
                    _eq: Open
                - host_steam_id:
                    _eq: X-Hasura-User-Id
                - players:
                    steam_id:
                      _eq: X-Hasura-User-Id
                - _and:
                    - access:
                        _eq: Friends
                    - players:
                        player:
                          friends:
                            steam_id:
                              _eq: X-Hasura-User-Id
    comment: ""
  - role: guest
    permission:
      columns:
        - draft_game_id
        - steam_id
        - status
        - joined_at
        - elo_snapshot
        - is_captain
        - lineup
        - pick_order
      filter:
        draft_game:
          access:
            _eq: Open
    comment: ""
insert_permissions:
  - role: user
    permission:
      check:
        _and:
          - _or:
              - steam_id:
                  _eq: X-Hasura-User-Id
              - draft_game:
                  host_steam_id:
                    _eq: X-Hasura-User-Id
          - draft_game:
              status:
                _eq: Open
          - draft_game:
              match_id:
                _is_null: true
          - player:
              is_banned:
                _eq: false
          - player:
              is_in_another_match:
                _eq: false
      columns:
        - draft_game_id
        - steam_id
    comment: ""
update_permissions:
  - role: user
    permission:
      columns:
        - status
        - lineup
        - pick_order
        - is_captain
      filter:
        _or:
          - steam_id:
              _eq: X-Hasura-User-Id
          - draft_game:
              host_steam_id:
                _eq: X-Hasura-User-Id
    comment: ""
delete_permissions:
  - role: user
    permission:
      filter:
        _or:
          - steam_id:
              _eq: X-Hasura-User-Id
          - draft_game:
              host_steam_id:
                _eq: X-Hasura-User-Id
    comment: ""
