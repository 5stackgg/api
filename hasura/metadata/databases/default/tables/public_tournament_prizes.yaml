table:
  name: tournament_prizes
  schema: public
object_relationships:
  - name: tournament
    using:
      foreign_key_constraint_on: tournament_id
insert_permissions:
  - role: user
    permission:
      check:
        tournament:
          is_organizer:
            _eq: true
      columns:
        - order
        - place
        - prize
        - tournament_id
    comment: ""
select_permissions:
  - role: guest
    permission:
      columns:
        - created_at
        - id
        - order
        - place
        - prize
        - tournament_id
      filter: {}
    comment: ""
update_permissions:
  - role: user
    permission:
      columns:
        - order
        - place
        - prize
      filter:
        tournament:
          is_organizer:
            _eq: true
      check:
        tournament:
          is_organizer:
            _eq: true
    comment: ""
delete_permissions:
  - role: user
    permission:
      filter:
        tournament:
          is_organizer:
            _eq: true
    comment: ""
