table:
  name: notifications
  schema: public
object_relationships:
  - name: player
    using:
      foreign_key_constraint_on: steam_id
select_permissions:
  - role: administrator
    permission:
      columns:
        - actions
        - created_at
        - deletable
        - deleted_at
        - entity_id
        - id
        - is_read
        - message
        - role
        - steam_id
        - title
        - type
      filter:
        _or:
          - steam_id:
              _eq: X-Hasura-User-Id
          - role:
              _eq: administrator
    comment: ""
  - role: match_organizer
    permission:
      columns:
        - actions
        - created_at
        - deletable
        - deleted_at
        - entity_id
        - id
        - is_read
        - message
        - role
        - steam_id
        - title
        - type
      filter:
        _or:
          - steam_id:
              _eq: X-Hasura-User-Id
          - role:
              _eq: match_organizer
    comment: ""
  - role: tournament_organizer
    permission:
      columns:
        - actions
        - created_at
        - deletable
        - deleted_at
        - entity_id
        - id
        - is_read
        - message
        - role
        - steam_id
        - title
        - type
      filter:
        _or:
          - steam_id:
              _eq: X-Hasura-User-Id
          - role:
              _in:
                - match_organizer
                - tournament_organizer
    comment: ""
  - role: user
    permission:
      columns:
        - actions
        - created_at
        - deletable
        - deleted_at
        - entity_id
        - id
        - is_read
        - message
        - role
        - steam_id
        - title
        - type
      filter:
        steam_id:
          _eq: X-Hasura-User-Id
    comment: ""
update_permissions:
  - role: administrator
    permission:
      columns:
        - deleted_at
        - is_read
      filter:
        _or:
          - steam_id:
              _eq: X-Hasura-User-Id
          - role:
              _eq: administrator
      check:
        _and:
          - _or:
              - steam_id:
                  _eq: X-Hasura-User-Id
              - role:
                  _eq: administrator
          - _or:
              - deleted_at:
                  _is_null: true
              - deletable:
                  _eq: true
    comment: ""
  - role: match_organizer
    permission:
      columns:
        - deleted_at
        - is_read
      filter:
        _or:
          - steam_id:
              _eq: X-Hasura-User-Id
          - role:
              _eq: match_organizer
      check:
        _and:
          - _or:
              - steam_id:
                  _eq: X-Hasura-User-Id
              - role:
                  _eq: match_organizer
          - _or:
              - deleted_at:
                  _is_null: true
              - deletable:
                  _eq: true
    comment: ""
  - role: tournament_organizer
    permission:
      columns:
        - deleted_at
        - is_read
      filter:
        _or:
          - steam_id:
              _eq: X-Hasura-User-Id
          - role:
              _in:
                - match_organizer
                - tournament_organizer
      check:
        _and:
          - _or:
              - steam_id:
                  _eq: X-Hasura-User-Id
              - role:
                  _in:
                    - match_organizer
                    - tournament_organizer
          - _or:
              - deleted_at:
                  _is_null: true
              - deletable:
                  _eq: true
    comment: ""
  - role: user
    permission:
      columns:
        - deleted_at
        - is_read
      filter:
        steam_id:
          _eq: X-Hasura-User-Id
      check:
        _and:
          - steam_id:
              _eq: X-Hasura-User-Id
          - _or:
              - deleted_at:
                  _is_null: true
              - deletable:
                  _eq: true
    comment: ""
