  - name: orphanedDemosScanResult
    definition:
      kind: synchronous
      handler: '{{HASURA_GRAPHQL_ACTIONS_HOOK}}'
      forward_client_headers: true
    permissions:
      - role: administrator
    comment: Return the latest S3 orphan-scan report (admin only).
