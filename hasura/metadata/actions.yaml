    definition:
      kind: synchronous
      handler: '{{HASURA_GRAPHQL_ACTIONS_HOOK}}'
      forward_client_headers: true
    permissions:
      - role: administrator
    comment: Re-parse every demo in the system (admin only). Runs one demo at a time in the background; this can take a very long time. Track via reparseAllDemosStatus.
  - name: cancelReparseAllDemos
    definition:
      kind: synchronous
      handler: '{{HASURA_GRAPHQL_ACTIONS_HOOK}}'
      forward_client_headers: true
    permissions:
      - role: administrator
