    definition:
      kind: synchronous
      handler: '{{HASURA_GRAPHQL_ACTIONS_HOOK}}'
      forward_client_headers: true
    permissions:
      - role: administrator
    comment: Re-parse all demos across every map for a match (admin only). Fires in the background and returns immediately.
