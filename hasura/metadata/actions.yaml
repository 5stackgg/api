      handler: '{{HASURA_GRAPHQL_ACTIONS_HOOK}}'
      forward_client_headers: true
    permissions:
      - role: administrator
    comment: Delete orphaned S3 objects found by the last scan (admin only). Each key is re-verified against the database before removal.
