services:
  timescaledb-test:
    image: timescale/timescaledb:latest-pg17
    environment:
      POSTGRES_DB: hasura_test
      POSTGRES_USER: hasura
      POSTGRES_PASSWORD: test_password
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data

  redis-test:
    image: redis:8.4-alpine
    ports:
      - "6380:6379"
